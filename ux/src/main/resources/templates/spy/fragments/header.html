<th:block th:fragment="header">
	<nav
		class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary shadow-sm px-3">
		<a class="navbar-brand fw-bold text-info"
			th:href="${trafficSpyUiPath + '/logs'}"><i
			class="bi bi-activity me-2"></i>Traffic Spy</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
			data-bs-target="#spyNavbar" aria-controls="spyNavbar"
			aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="spyNavbar">
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<li class="nav-item"><a class="nav-link"
					th:classappend="${activePage == 'logs'} ? ' active fw-semibold text-info' : ''"
					th:href="${trafficSpyUiPath + '/logs'}"><i
						class="bi bi-house-door me-1"></i> LIVE</a></li>
				<li class="nav-item"><a class="nav-link"
					th:classappend="${activePage == 'search'} ? ' active fw-semibold text-info' : ''"
					th:href="${trafficSpyUiPath + '/search'}"><i
						class="bi bi-search me-1"></i> Search</a></li>
			</ul>
			<div class="d-flex align-items-center gap-2">
				<form th:action="${trafficSpyUiPath + '/logout'}" method="post"
					class="m-0">
					<button type="submit" class="btn btn-danger btn-sm">
						<i class="bi bi-box-arrow-right me-1"></i> Logout
					</button>
				</form>
			</div>
		</div>
	</nav>
</th:block>
