<th:block th:fragment="dashboard">
	<div class="row g-3">
		
		<div class="col-12 col-sm-6 col-xl-3">
			<div class="card bg-dark text-light border-secondary shadow h-100">
				<div class="card-body d-flex flex-column justify-content-between">
					<!-- HEADER + BUTTON -->
					<div class="d-flex justify-content-between align-items-start mb-2">
						<div class="text-secondary small text-uppercase">Total
							Requests</div>
						<button type="button" id="toggleRefreshBtn"
							class="btn btn-success btn-sm py-1 px-2">
							<i class="bi bi-play-fill"></i>
						</button>
					</div>

					<div class="d-flex justify-content-between align-items-center">
						<div class="fs-2 fw-bold text-info" id="totalRequests">0</div>
						<div class="fs-1 text-info opacity-75">
							<i class="bi bi-activity"></i>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="col-12 col-sm-6 col-xl-3">
			<div class="card bg-dark text-light border-secondary shadow h-100">
				<div
					class="card-body d-flex justify-content-between align-items-center">
					<div>
						<div class="text-secondary small text-uppercase">Avg
							Duration</div>
						<div class="fs-2 fw-bold text-success mt-2" id="avgDuration">0
							ms</div>
					</div>
					<div class="fs-1 text-success opacity-75">
						<i class="bi bi-clock-history"></i>
					</div>
				</div>
			</div>
		</div>

		<div class="col-12 col-sm-6 col-xl-3">
			<div class="card bg-dark text-light border-secondary shadow h-100">
				<div
					class="card-body d-flex justify-content-between align-items-center">
					<div>
						<div class="text-secondary small text-uppercase">Error Rate</div>
						<div class="fs-2 fw-bold text-danger mt-2" id="errorRate">0%</div>
					</div>
					<div class="fs-1 text-danger opacity-75">
						<i class="bi bi-exclamation-triangle"></i>
					</div>
				</div>
			</div>
		</div>

		<div class="col-12 col-sm-6 col-xl-3">
			<div class="card bg-dark text-light border-secondary shadow h-100">
				<div
					class="card-body d-flex justify-content-between align-items-center">
					<div class="w-100">
						<div class="text-secondary small text-uppercase">Last
							Request</div>
						<div class="fw-bold text-warning mt-2 text-break" id="lastRequest">-</div>
					</div>
					<div class="fs-1 text-warning opacity-75 ms-3">
						<i class="bi bi-arrow-repeat"></i>
					</div>
				</div>
			</div>
		</div>
	</div>
</th:block>
